<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAML Resume Builder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  .toolbar h1 {
    font-size: 16px;
    font-weight: 600;
    color: #e94560;
    margin-right: auto;
  }
  .toolbar select {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #0f3460;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
  }
  .toolbar button {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-pdf {
    background: #e94560;
    color: #fff;
  }
  .btn-pdf:hover { background: #c23152; }
  .btn-html {
    background: #0f3460;
    color: #fff;
  }
  .btn-html:hover { background: #1a4a7a; }

  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .editor-panel {
    width: 45%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #0f3460;
  }
  .editor-panel .panel-header {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
  }
  .editor-wrap {
    flex: 1;
    overflow: auto;
  }
  .CodeMirror {
    height: 100%;
    font-size: 13px;
    line-height: 1.5;
  }

  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f5f5f5;
  }
  .preview-panel .panel-header {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    background: #eee;
    border-bottom: 1px solid #ddd;
  }
  .preview-wrap {
    flex: 1;
    overflow: auto;
    display: flex;
    justify-content: center;
    padding: 20px;
    background: #d4d4d4;
  }
  .preview-wrap iframe {
    width: 210mm;
    height: 297mm;
    border: none;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    flex-shrink: 0;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.error { background: #e94560; color: #fff; }
  .toast.success { background: #2ecc71; color: #fff; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <div class="toolbar">
    <h1>YAML Resume Builder</h1>
    <label for="theme-select" style="font-size:13px;">Theme:</label>
    <select id="theme-select">
      {% for t in themes %}
      <option value="{{ t }}">{{ t | capitalize }}</option>
      {% endfor %}
    </select>
    <button class="btn-pdf" onclick="downloadFile('pdf')">Download PDF</button>
    <button class="btn-html" onclick="downloadFile('html')">Download HTML</button>
  </div>

  <div class="workspace">
    <div class="editor-panel">
      <div class="panel-header">YAML Editor</div>
      <div class="editor-wrap">
        <textarea id="yaml-editor">{{ sample_yaml }}</textarea>
      </div>
    </div>
    <div class="preview-panel">
      <div class="panel-header">Live Preview</div>
      <div class="preview-wrap">
        <iframe id="preview-frame"></iframe>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
<script>
  const editor = CodeMirror.fromTextArea(document.getElementById("yaml-editor"), {
    mode: "yaml",
    theme: "material-darker",
    lineNumbers: true,
    lineWrapping: true,
    tabSize: 2,
  });

  const themeSelect = document.getElementById("theme-select");
  const previewFrame = document.getElementById("preview-frame");

  let debounceTimer = null;
  function schedulePreview() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updatePreview, 600);
  }
  editor.on("change", schedulePreview);
  themeSelect.addEventListener("change", () => updatePreview());

  async function updatePreview() {
    const yaml = editor.getValue();
    const theme = themeSelect.value;
    try {
      const res = await fetch("/preview", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ yaml, theme }),
      });
      const data = await res.json();
      if (data.error) {
        showToast(data.error, "error");
        return;
      }
      const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      doc.open();
      doc.write(data.html);
      doc.close();
    } catch (e) {
      showToast("Preview failed: " + e.message, "error");
    }
  }

  async function downloadFile(fmt) {
    const yaml = editor.getValue();
    const theme = themeSelect.value;
    try {
      const res = await fetch(`/download/${fmt}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ yaml, theme }),
      });
      if (!res.ok) {
        const data = await res.json();
        showToast(data.error || "Download failed", "error");
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${theme}_resume.${fmt}`;
      a.click();
      URL.revokeObjectURL(url);
      showToast(`${fmt.toUpperCase()} downloaded!`, "success");
    } catch (e) {
      showToast("Download failed: " + e.message, "error");
    }
  }

  function showToast(msg, type) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = "toast"; }, 3500);
  }

  updatePreview();
</script>
</body>
</html>
